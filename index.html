<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joel's Gym Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #060608; color: #e8e8ec; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* ── Mesh gradient background ── */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 12% 35%, rgba(0,217,255,0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 88% 12%, rgba(192,132,252,0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 92%, rgba(0,217,255,0.10) 0%, transparent 40%),
      radial-gradient(ellipse at 72% 58%, rgba(192,132,252,0.09) 0%, transparent 35%);
    animation: meshDrift 22s ease-in-out infinite alternate;
  }
  @keyframes meshDrift {
    0%   { opacity: 1; transform: scale(1)   rotate(0deg); }
    50%  { opacity: 0.85; }
    100% { opacity: 1; transform: scale(1.04) rotate(0.5deg); }
  }

  /* ── Glass mixin ── */
  .glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: 0 4px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(6,6,8,0.80); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 1.1rem 2rem; display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 1.35rem; font-weight: 700; color: #fff; letter-spacing: 0.4px; }
  header h1 span { color: #00d9ff; }

  /* ── Layout ── */
  main, #global-session { position: relative; z-index: 1; }
  main { max-width: 1400px; margin: 0 auto; padding: 2rem; }
  #global-session { max-width: 1400px; margin: 0 auto; padding: 0 2rem 3rem; }

  /* ── Tab panels ── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: panelIn 0.35s ease forwards; }
  @keyframes panelIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Section title ── */
  .section-title {
    font-size: 0.68rem; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
    color: rgba(255,255,255,0.55); margin-bottom: 1rem;
  }

  /* ── PR cards ── */
  .pr-grid { display: flex; flex-wrap: wrap; gap: 0.85rem; margin-bottom: 2.5rem; }
  .pr-card {
    background: rgba(255,255,255,0.10); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.18); border-radius: 14px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.12);
    padding: 1rem 1.2rem; min-width: 130px; flex: 1; max-width: 185px;
    transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    cursor: default;
  }
  .pr-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.09);
    border-color: rgba(255,255,255,0.18);
  }
  .pr-card .ex-name { font-size: 0.68rem; color: rgba(255,255,255,0.65); margin-bottom: 0.35rem; line-height: 1.4; }
  .pr-card .pr-value { font-size: 1.6rem; font-weight: 800; }
  .pr-card .pr-unit { font-size: 0.72rem; color: rgba(255,255,255,0.55); margin-left: 2px; }
  .pr-card .pr-label { font-size: 0.62rem; color: rgba(255,255,255,0.45); margin-top: 0.2rem; letter-spacing: 0.5px; }

  /* ── Charts ── */
  .charts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.25rem; margin-bottom: 2.5rem; }
  .chart-card {
    background: rgba(255,255,255,0.09); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.16); border-radius: 14px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.4); padding: 1.2rem 1.4rem;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .chart-card:hover { border-color: rgba(255,255,255,0.17); box-shadow: 0 6px 32px rgba(0,0,0,0.45); }
  .chart-card h3 { font-size: 0.75rem; color: rgba(255,255,255,0.75); margin-bottom: 1rem; font-weight: 600; letter-spacing: 0.3px; }
  .chart-card canvas { max-height: 180px; }

  /* ── Calendar ── */
  .cal-outer { display: flex; align-items: flex-start; gap: 2rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .cal-widget {
    background: rgba(255,255,255,0.09); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.16); border-radius: 14px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.4); padding: 1.1rem; min-width: 234px;
  }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; }
  .cal-nav {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
    color: rgba(255,255,255,0.5); width: 26px; height: 26px; border-radius: 6px;
    cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .cal-nav:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .cal-month-label { font-size: 0.85rem; color: rgba(255,255,255,0.7); font-weight: 600; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-dayname { text-align: center; font-size: 0.58rem; color: rgba(255,255,255,0.45); padding-bottom: 4px; }
  .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; border-radius: 6px; color: rgba(255,255,255,0.1); user-select: none; }
  .cal-day.push { background: rgba(0,217,255,0.12); color: #00d9ff; cursor: pointer; font-weight: 700; border: 1px solid rgba(0,217,255,0.25); transition: background 0.15s; }
  .cal-day.pull { background: rgba(192,132,252,0.12); color: #c084fc; cursor: pointer; font-weight: 700; border: 1px solid rgba(192,132,252,0.25); transition: background 0.15s; }
  .cal-day.push:hover { background: rgba(0,217,255,0.22); }
  .cal-day.pull:hover { background: rgba(192,132,252,0.22); }
  .cal-day.sel-push { background: #00d9ff !important; color: #000 !important; border-color: transparent !important; box-shadow: 0 0 12px rgba(0,217,255,0.5); }
  .cal-day.sel-pull { background: #c084fc !important; color: #000 !important; border-color: transparent !important; box-shadow: 0 0 12px rgba(192,132,252,0.5); }
  .cal-legend { display: flex; flex-direction: column; gap: 0.5rem; justify-content: center; }
  .cal-legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: rgba(255,255,255,0.70); }
  .cal-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .cal-selected-info { font-size: 0.82rem; color: rgba(255,255,255,0.60); align-self: center; }

  /* ── Session note ── */
  .session-note {
    background: rgba(0,217,255,0.06); border: 1px solid rgba(0,217,255,0.15);
    border-left: 3px solid rgba(0,217,255,0.5); border-radius: 10px;
    padding: 0.7rem 1rem; margin-bottom: 1rem; font-size: 0.82rem;
    color: rgba(0,217,255,0.7); line-height: 1.6;
  }
  .ex-note { font-size: 0.68rem; color: rgba(255,255,255,0.50); font-style: italic; margin-top: 3px; }

  /* ── Table ── */
  .session-table-wrap {
    background: rgba(255,255,255,0.08); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 14px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.4); overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  table { width: 100%; border-collapse: collapse; min-width: 480px; }
  thead th {
    background: rgba(255,255,255,0.04); font-size: 0.68rem; font-weight: 700;
    letter-spacing: 1.8px; text-transform: uppercase; color: rgba(255,255,255,0.55);
    padding: 0.7rem 1rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  tbody tr { border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.15s; }
  tbody tr:hover { background: rgba(255,255,255,0.03); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr.ex-group-start td { padding-top: 0.95rem; }
  tbody tr.ex-group-end td { padding-bottom: 0.95rem; }
  tbody td { padding: 0.3rem 1rem; font-size: 0.875rem; color: rgba(255,255,255,0.85); }
  td.ex-name-cell { color: rgba(255,255,255,0.70); font-size: 0.78rem; min-width: 220px; }
  td.weight-cell { font-weight: 600; min-width: 80px; }
  td.reps-cell { color: rgba(255,255,255,0.85); min-width: 60px; }
  td.set-cell { color: rgba(255,255,255,0.40); width: 40px; }
  .no-weight-note { color: rgba(255,255,255,0.50); font-size: 0.7rem; font-style: italic; }

  /* ── Split toggle (tab bar) ── */
  .split-toggle-wrap {
    max-width: 1400px; margin: 1.75rem auto 0; padding: 0 2rem;
    position: relative; z-index: 1;
  }
  .split-toggle-wrap .view-toggle {
    background: rgba(255,255,255,0.07); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.20); border-radius: 12px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
    display: inline-flex; gap: 4px; padding: 4px; overflow: visible;
  }
  .split-toggle-wrap .view-btn {
    padding: 0.6rem 1.8rem; border-radius: 9px; border: none;
    font-size: 0.88rem; font-weight: 600;
    color: rgba(255,255,255,0.55); letter-spacing: 0.2px;
    transition: color 0.2s, background 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .split-toggle-wrap .view-btn:hover { color: #fff; background: rgba(255,255,255,0.10); }
  .split-toggle-wrap .view-btn[data-split="brust"].active {
    color: #00d9ff; background: rgba(0,217,255,0.18);
    box-shadow: 0 0 14px rgba(0,217,255,0.25), inset 0 1px 0 rgba(0,217,255,0.2);
  }
  .split-toggle-wrap .view-btn[data-split="ruecken"].active {
    color: #c084fc; background: rgba(192,132,252,0.18);
    box-shadow: 0 0 14px rgba(192,132,252,0.25), inset 0 1px 0 rgba(192,132,252,0.2);
  }

  /* ── View toggle (charts/timeline) ── */
  .view-toggle-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.1rem; flex-wrap: wrap; gap: 0.75rem; }
  .view-toggle {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.18); border-radius: 10px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    display: flex; gap: 3px; padding: 3px; overflow: visible;
  }
  .view-btn {
    background: none; border: none; color: rgba(255,255,255,0.60);
    padding: 0.38rem 1rem; font-size: 0.8rem; font-weight: 600;
    border-radius: 7px; cursor: pointer; transition: all 0.15s;
  }
  .view-btn:hover { color: #fff; background: rgba(255,255,255,0.10); }
  .view-btn.active { background: rgba(255,255,255,0.16); color: #fff; box-shadow: 0 1px 6px rgba(0,0,0,0.3); }

  /* ── Chart legend ── */
  .chart-legend { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.85rem; }
  .cl-item { display: flex; align-items: center; gap: 5px; font-size: 0.68rem; color: rgba(255,255,255,0.60); }
  .cl-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* ── Deltas ── */
  .delta { font-size: 0.66rem; margin-left: 5px; font-weight: 600; }
  .delta-pos { color: #4ade80; }
  .delta-neg { color: #f87171; }
  .delta-eq  { color: rgba(255,255,255,0.38); }

  /* ── Weight timeline ── */
  .tl-wrap { margin-bottom: 2.5rem; display: flex; flex-direction: column; gap: 0.85rem; }
  .tl-exercise {
    background: rgba(255,255,255,0.09); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.16); border-radius: 14px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.4); padding: 1rem 1.4rem 1.7rem;
    transition: border-color 0.2s ease;
  }
  .tl-exercise:hover { border-color: rgba(255,255,255,0.17); }
  .tl-ex-name { font-size: 0.75rem; color: rgba(255,255,255,0.75); font-weight: 600; margin-bottom: 1.1rem; letter-spacing: 0.2px; }
  .tl-track { position: relative; height: 62px; margin: 0 18px; }
  .tl-line { position: absolute; top: 11px; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.07); border-radius: 1px; }
  .tl-milestone { position: absolute; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; }
  .tl-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #060608; z-index: 1; flex-shrink: 0; }
  .tl-info { margin-top: 7px; text-align: center; white-space: nowrap; }
  .tl-date { font-size: 0.60rem; color: rgba(255,255,255,0.55); }
  .tl-weight { font-size: 0.72rem; color: rgba(255,255,255,0.7); font-weight: 600; }
  .tl-delta { font-size: 0.68rem; font-weight: 700; }

  /* ── Fade-in animation ── */
  .fade-in-up { opacity: 0; transform: translateY(18px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .fade-in-up.visible { opacity: 1; transform: translateY(0); }
  .fade-in-up:nth-child(2) { transition-delay: 0.07s; }
  .fade-in-up:nth-child(3) { transition-delay: 0.14s; }

  /* ── Mobile ── */
  @media (max-width: 640px) {
    header { padding: 0.9rem 1rem; }
    header h1 { font-size: 1.1rem; }
    main { padding: 1rem; }
    #global-session { padding: 0 1rem 2rem; }
    .split-toggle-wrap { padding: 0 1rem; margin-top: 1.25rem; }
    .split-toggle-wrap .view-toggle { width: 100%; }
    .split-toggle-wrap .view-btn { flex: 1; text-align: center; padding: 0.7rem 0.5rem; font-size: 0.82rem; }
    .pr-grid { gap: 0.6rem; }
    .pr-card { min-width: 110px; padding: 0.8rem 0.9rem; }
    .pr-card .pr-value { font-size: 1.3rem; }
    .charts-grid { grid-template-columns: 1fr; }
    .view-toggle-bar { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    .cal-outer { gap: 1rem; }
    .cal-widget { min-width: unset; width: 100%; }
    td.ex-name-cell { min-width: 140px; font-size: 0.72rem; }
    td.weight-cell { min-width: 70px; font-size: 0.82rem; }
    td.reps-cell { min-width: 55px; font-size: 0.82rem; }
    tbody td { padding: 0.3rem 0.6rem; }
    thead th { padding: 0.55rem 0.6rem; font-size: 0.62rem; }
    .tl-track { margin: 0 8px; }
    .section-title { font-size: 0.62rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Joel's <span>Gym Tracker</span></h1>
</header>

<main>
  <div class="split-toggle-wrap">
    <div class="view-toggle">
      <button class="view-btn active" data-split="brust" onclick="switchTab('brust',this)">Brust (PUSH)</button>
      <button class="view-btn" data-split="ruecken" onclick="switchTab('ruecken',this)">Rücken (PULL)</button>
    </div>
  </div>
  <div id="panel-brust" class="tab-panel active"></div>
  <div id="panel-ruecken" class="tab-panel"></div>

  <div id="global-session">
    <p class="section-title">Trainingstag</p>
    <div class="cal-outer">
      <div class="cal-widget"><div id="global-cal"></div></div>
      <div class="cal-legend">
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#00d9ff"></div>Brust (PUSH)</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#c084fc"></div>Rücken (PULL)</div>
      </div>
      <span class="cal-selected-info" id="cal-info"></span>
    </div>
    <div id="global-snote" class="session-note" style="display:none"></div>
    <div class="session-table-wrap">
      <table>
        <thead><tr><th>Übung</th><th>#</th><th>Gewicht</th><th>Wiederholungen</th></tr></thead>
        <tbody id="global-tbody"></tbody>
      </table>
    </div>
  </div>
</main>

function exLabel(split, name) {
  const n  = PLAN_NO[split]?.[name];
  const de = DE_NAMES[name] ?? name;
  return n != null ? `${n}. ${de}` : de;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmtDate(iso) {
  const [y, m, d] = iso.split("-");
  return `${d}.${m}.${y}`;
}
function fmtDateShort(iso) {
  const [, m, d] = iso.split("-");
  return `${d}.${m}`;
}

function avgWeight(sets) {
  const weighted = sets.filter(s => s.w !== null);
  if (!weighted.length) return null;
  return weighted.reduce((a, s) => a + s.w, 0) / weighted.length;
}
function maxWeight(sets) {
  const weighted = sets.filter(s => s.w !== null);
  if (!weighted.length) return null;
  return Math.max(...weighted.map(s => s.w));
}
function totalReps(sets) {
  return sets.reduce((a, s) => a + s.r, 0);
}
function avgReps(sets) {
  return sets.reduce((a, s) => a + s.r, 0) / sets.length;
}

function sessionsFor(split) {
  return SESSIONS.filter(s => s.split === split).sort((a, b) => a.date.localeCompare(b.date));
}

// All exercise names for a split, across all sessions
function exerciseNames(split) {
  const names = new Set();
  sessionsFor(split).forEach(s => Object.keys(s.exercises).forEach(n => names.add(n)));
  return [...names];
}

function getPR(split, exercise) {
  let pr = null;
  sessionsFor(split).forEach(s => {
    if (!s.exercises[exercise]) return;
    const m = maxWeight(s.exercises[exercise]);
    if (m !== null && (pr === null || m > pr)) pr = m;
  });
  return pr;
}

function sessionVolume(sets) {
  return sets.reduce((sum, s) => sum + (s.w ?? 0) * s.r, 0);
}

const PC_WEIGHT = '#4ade80'; // grün  — Gewicht erhöht
const PC_REPS   = '#60a5fa'; // blau  — mehr Wdh
const PC_BOTH   = '#ffd60a'; // gelb  — beides
const PC_NONE   = '#555';    // grau  — kein Fortschritt
const PC_DOWN   = '#f87171'; // rot   — Gewicht reduziert

function pointColor(curr, prev, bodyweight = false) {
  if (!prev) return PC_NONE;
  if (bodyweight) {
    return totalReps(curr) > totalReps(prev) ? PC_REPS : PC_NONE;
  }
  const wCurr = maxWeight(curr), wPrev = maxWeight(prev);
  const wUp   = wCurr > wPrev;
  const wDown = wCurr < wPrev;
  const rUp   = avgReps(curr) > avgReps(prev);
  if (wDown)      return PC_DOWN;
  if (wUp && rUp) return PC_BOTH;
  if (wUp)        return PC_WEIGHT;
  if (rUp)        return PC_REPS;
  return PC_NONE;
}

function getChartData(split, exercise, mode, splitCol) {
  const sessions = sessionsFor(split).filter(s => s.exercises[exercise]);
  return {
    labels: sessions.map(s => fmtDateShort(s.date)),
    data: sessions.map(s => {
      const sets = s.exercises[exercise];
      if (mode === "reps") return totalReps(sets);
      return +sessionVolume(sets).toFixed(1);
    }),
    pointColors: sessions.map((s, i) =>
      pointColor(s.exercises[exercise], sessions[i-1]?.exercises[exercise], mode === "reps")
    ),
    extra: sessions.map(s => {
      const sets = s.exercises[exercise];
      const withW = sets.filter(x => x.w !== null);
      return {
        avgW: withW.length ? +(withW.reduce((a, x) => a + x.w, 0) / withW.length).toFixed(2) : null,
        avgR: +(sets.reduce((a, x) => a + x.r, 0) / sets.length).toFixed(1),
        vol:  +sessionVolume(sets).toFixed(1),
        sets: sets.length,
      };
    }),
  };
}

// ─── WEIGHT TIMELINE ─────────────────────────────────────────────────────────
function buildWeightTimelines(split) {
  const sessions = sessionsFor(split);
  const planNos = PLAN_NO[split] ?? {};
  const exNames = exerciseNames(split)
    .filter(ex => !BODYWEIGHT_EX.has(ex))
    .sort((a, b) => (planNos[a] ?? 99) - (planNos[b] ?? 99));

  const cards = exNames.map(ex => {
    const points = sessions
      .filter(s => s.exercises[ex])
      .map(s => ({ date: s.date, maxW: maxWeight(s.exercises[ex]) }))
      .filter(d => d.maxW !== null);
    if (!points.length) return '';

    // collect milestones: start + every session where max weight exceeds previous peak
    const milestones = [];
    let peak = null;
    points.forEach(p => {
      if (peak === null || p.maxW > peak) {
        milestones.push({ date: p.date, weight: p.maxW, delta: peak !== null ? +(p.maxW - peak).toFixed(2) : null });
        peak = p.maxW;
      }
    });

    // time positions as %
    const t0 = new Date(points[0].date).getTime();
    const t1 = new Date(points[points.length - 1].date).getTime();
    const span = t1 - t0 || 1;

    const c = splitColor(split);
    const dots = milestones.map((m, i) => {
      const pct = ((new Date(m.date).getTime() - t0) / span * 96).toFixed(1);
      const dotBg = i === 0 ? '#333' : c.main;
      return `<div class="tl-milestone" style="left:${pct}%">
        <div class="tl-dot" style="background:${dotBg}"></div>
        <div class="tl-info">
          <div class="tl-date">${fmtDateShort(m.date)}</div>
          <div class="tl-weight">${m.weight} kg</div>
          ${m.delta !== null ? `<div class="tl-delta" style="color:${c.main}">+${m.delta} kg</div>` : ''}
        </div>
      </div>`;
    }).join('');

    return `<div class="tl-exercise">
      <div class="tl-ex-name">${exLabel(split, ex)}</div>
      <div class="tl-track">
        <div class="tl-line"></div>
        ${dots}
      </div>
    </div>`;
  }).join('');

  return `<p class="section-title">Gewichtssteigerungen</p><div class="tl-wrap">${cards}</div>`;
}

function buildDateMap() {
  const m = {};
  SESSIONS.forEach(s => { m[s.date] = s.split; });
  return m;
}

const calState = { year: 2026, month: 4, selected: null };

function renderGlobalCal() {
  const { year, month, selected } = calState;
  const dateMap = buildDateMap();
  const firstDow = (new Date(year, month - 1, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(year, month, 0).getDate();

  let cells = DAY_NAMES.map(d => `<div class="cal-dayname">${d}</div>`).join('');
  for (let i = 0; i < firstDow; i++) cells += `<div class="cal-day"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const split = dateMap[iso];
    const isSel = iso === selected;
    let cls = 'cal-day';
    if (split === 'Brust')   cls += isSel ? ' sel-push' : ' push';
    else if (split === 'Rücken') cls += isSel ? ' sel-pull' : ' pull';
    const click = split ? `onclick="selectGlobalDay('${iso}')"` : '';
    cells += `<div class="${cls}" ${click}>${d}</div>`;
  }

  document.getElementById('global-cal').innerHTML = `
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)">&#8249;</button>
      <span class="cal-month-label">${MONTH_NAMES[month-1]} ${year}</span>
      <button class="cal-nav" onclick="calNav(1)">&#8250;</button>
    </div>
    <div class="cal-grid">${cells}</div>`;
}

function calNav(dir) {
  let { year, month } = calState;
  month += dir;
  if (month > 12) { month = 1; year++; }
  if (month < 1)  { month = 12; year--; }
  calState.year = year; calState.month = month;
  renderGlobalCal();
}

function selectGlobalDay(date) {
  calState.selected = date;
  renderGlobalCal();
  const session = SESSIONS.find(s => s.date === date);
  if (!session) return;
  // Switch to correct tab
  const isBrust = session.split === 'Brust';
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', isBrust ? i === 0 : i === 1));
  document.querySelectorAll('.tab-panel').forEach((p, i) => p.classList.toggle('active', isBrust ? i === 0 : i === 1));
  const containerId = isBrust ? 'panel-brust' : 'panel-ruecken';
  const split = session.split;
  updateGlobalTable(date);
  document.getElementById('global-tbody')?.closest('.session-table-wrap')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  // Update info label
  const info = document.getElementById('cal-info');
  if (info) info.textContent = `${fmtDate(date)} · ${session.split} · ${session.duration} Min.`;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
const COLORS = {
  push:   { main: "#00d9ff", bg: "rgba(0,217,255,0.12)" },
  pull:   { main: "#c084fc", bg: "rgba(192,132,252,0.12)" },
  pr:     { main: "#ff9f0a", bg: "rgba(255,159,10,0.12)" },
};
function splitColor(split) { return split === "Brust" ? COLORS.push : COLORS.pull; }
const BODYWEIGHT_EX = new Set(["Triceps Dip", "Decline Push Up", "Crunch"]);

let chartInstances = [];

function renderPanel(split, containerId) {
  const container = document.getElementById(containerId);
  const sessions = sessionsFor(split);
  const exNames = exerciseNames(split);
  const latest = sessions[sessions.length - 1];
  const sc = splitColor(split);

  // ── PR cards ──
  const prHTML = exNames.map(ex => {
    const pr = getPR(split, ex);
    const isBW = BODYWEIGHT_EX.has(ex);
    if (isBW) {
      // find max total reps in a session
      let maxR = 0;
      sessions.forEach(s => {
        if (s.exercises[ex]) {
          const t = totalReps(s.exercises[ex]);
          if (t > maxR) maxR = t;
        }
      });
      return `<div class="pr-card">
        <div class="ex-name">${exLabel(split, ex)}</div>
        <div class="pr-value" data-target="${maxR}" data-decimals="0" style="color:${sc.main}">0<span class="pr-unit">Wdh</span></div>
        <div class="pr-label">max. Gesamtreps</div>
      </div>`;
    }
    const decimals = (pr % 1 !== 0) ? 1 : 0;
    return `<div class="pr-card">
      <div class="ex-name">${exLabel(split, ex)}</div>
      <div class="pr-value" data-target="${pr}" data-decimals="${decimals}" style="color:${sc.main}">0<span class="pr-unit">kg</span></div>
      <div class="pr-label">persönl. Bestleistung</div>
    </div>`;
  }).join("");

  // ── Charts ──
  const chartCards = exNames.map((ex, i) => {
    const isBW = BODYWEIGHT_EX.has(ex);
    const mode = isBW ? "reps" : "volume";
    const canvasId = `chart-${containerId}-${i}`;
    return `<div class="chart-card">
      <h3>${exLabel(split, ex)} ${isBW ? "(Wdh gesamt)" : "(Volumen kg×Wdh)"}</h3>
      <canvas id="${canvasId}"></canvas>
    </div>`;
  }).join("");

  container.innerHTML = `
    <p class="section-title" style="margin-top:2rem">Persönliche Bestleistungen</p>
    <div class="pr-grid fade-in-up">${prHTML}</div>

    <div class="view-toggle-bar fade-in-up">
      <p class="section-title" style="margin:0">Fortschritt</p>
      <div class="view-toggle">
        <button class="view-btn active" onclick="setView('${containerId}','charts',this)">Volumen-Diagramme</button>
        <button class="view-btn" onclick="setView('${containerId}','timeline',this)">Gewichtssteigerungen</button>
      </div>
    </div>
    <div id="view-charts-${containerId}" class="fade-in-up">
      <div class="chart-legend">
        <span class="cl-item"><span class="cl-dot" style="background:#4ade80"></span>Gewicht erhöht</span>
        <span class="cl-item"><span class="cl-dot" style="background:#60a5fa"></span>Mehr Wdh</span>
        <span class="cl-item"><span class="cl-dot" style="background:#ffd60a"></span>Beides</span>
        <span class="cl-item"><span class="cl-dot" style="background:#555"></span>Kein Fortschritt</span>
        <span class="cl-item"><span class="cl-dot" style="background:#f87171"></span>Gewicht reduziert</span>
      </div>
      <div class="charts-grid">${chartCards}</div>
    </div>
    <div id="view-timeline-${containerId}" style="display:none">${buildWeightTimelines(split)}</div>

  `;

  // ── Count-up on PR values ──
  container.querySelectorAll('.pr-value[data-target]').forEach(el => {
    const target   = parseFloat(el.dataset.target);
    const decimals = parseInt(el.dataset.decimals ?? 0);
    const unit     = el.querySelector('span');
    const t0 = performance.now();
    const tick = now => {
      const p = Math.min((now - t0) / 750, 1);
      const v = (1 - Math.pow(1 - p, 3)) * target;
      el.childNodes[0].textContent = v.toFixed(decimals);
      if (p < 1) requestAnimationFrame(tick);
      else el.childNodes[0].textContent = target.toFixed(decimals);
    };
    requestAnimationFrame(tick);
  });

  // ── Init charts after DOM is ready ──
  exNames.forEach((ex, i) => {
    const isBW = BODYWEIGHT_EX.has(ex);
    const mode = isBW ? "reps" : "volume";
    const { labels, data, extra, pointColors } = getChartData(split, ex, mode, sc.main);
    const canvasId = `chart-${containerId}-${i}`;
    const ctx = document.getElementById(canvasId).getContext("2d");

    const instance = new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets: [{
          data,
          extra,
          borderColor: sc.main,
          backgroundColor: sc.bg,
          borderWidth: 2,
          pointBackgroundColor: pointColors,
          pointBorderColor: pointColors,
          pointRadius: 5,
          pointHoverRadius: 7,
          fill: true,
          tension: 0.3,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => {
                if (mode === "reps") return `${ctx.parsed.y} Wdh gesamt`;
                const e   = ctx.dataset.extra?.[ctx.dataIndex];
                const col = ctx.dataset.pointBackgroundColor?.[ctx.dataIndex];
                if (!e) return `${ctx.parsed.y} kg·Wdh`;
                const driver =
                  col === PC_BOTH   ? '↑ Gewicht + Wdh'    :
                  col === PC_WEIGHT ? '↑ Mehr Gewicht'      :
                  col === PC_REPS   ? '↑ Mehr Wdh'          :
                  col === PC_DOWN   ? '↓ Gewicht reduziert' : '→ Kein Fortschritt';
                const lines = [`Volumen: ${e.vol} kg·Wdh`, driver];
                if (e.avgW !== null) lines.push(`Ø Gewicht: ${e.avgW} kg`);
                lines.push(`Ø Wdh: ${e.avgR}`);
                return lines;
              }
            }
          }
        },
        scales: {
          x: {
            ticks: { color: "#555", font: { size: 10 } },
            grid: { color: "#1a1a1a" },
          },
          y: {
            ticks: {
              color: "#555",
              font: { size: 10 },
              callback: v => mode === "reps" ? `${v} Wdh` : `${v}`,
            },
            grid: { color: "#1a1a1a" },
          }
        }
      }
    });
    chartInstances.push(instance);
  });
}

function delta(curr, prev) {
  if (prev == null || curr == null) return '';
  const d = Math.round((curr - prev) * 100) / 100;
  if (d === 0) return `<span class="delta delta-eq">–</span>`;
  const sign = d > 0 ? '+' : '';
  const cls = d > 0 ? 'delta-pos' : 'delta-neg';
  return `<span class="delta ${cls}">${sign}${d}</span>`;
}

function buildSessionRows(split, session, prev) {
  const notes   = session.exerciseNotes ?? {};
  const planNos = PLAN_NO[split] ?? {};
  const wColor  = splitColor(split).main;
  const sorted  = Object.entries(session.exercises)
    .sort(([a], [b]) => (planNos[a] ?? 99) - (planNos[b] ?? 99));

  return sorted.map(([ex, sets]) => {
    const prevSets = prev?.exercises?.[ex] ?? [];
    return sets.map((set, idx) => {
      const isFirst = idx === 0;
      const isLast  = idx === sets.length - 1;
      const p       = prevSets[idx] ?? null;

      const wCell = set.w !== null
        ? `<td class="weight-cell" style="color:${wColor}">${set.w} kg${delta(set.w, p?.w)}</td>`
        : `<td class="weight-cell"><span class="no-weight-note">Körpergewicht</span></td>`;

      const rCell = `<td class="reps-cell">${set.r} Wdh${delta(set.r, p?.r)}</td>`;

      const nameCell = isFirst
        ? `<td class="ex-name-cell">${exLabel(split, ex)}${notes[ex] ? `<div class="ex-note">ℹ ${notes[ex]}</div>` : ""}</td>`
        : `<td class="ex-name-cell"></td>`;

      return `<tr class="${isFirst ? "ex-group-start" : ""} ${isLast ? "ex-group-end" : ""}">
        ${nameCell}<td class="set-cell">${idx + 1}</td>${wCell}${rCell}
      </tr>`;
    }).join("");
  }).join("");
}

function updateGlobalTable(date) {
  const session = SESSIONS.find(s => s.date === date);
  if (!session) return;
  const arr  = sessionsFor(session.split);
  const idx  = arr.findIndex(s => s.date === date);
  const prev = idx > 0 ? arr[idx - 1] : null;
  document.getElementById('global-tbody').innerHTML = buildSessionRows(session.split, session, prev);
  const noteEl = document.getElementById('global-snote');
  if (noteEl) { noteEl.textContent = session.note ?? ""; noteEl.style.display = session.note ? "block" : "none"; }
}

function setView(containerId, view, btn) {
  document.getElementById(`view-charts-${containerId}`).style.display   = view === 'charts'   ? '' : 'none';
  document.getElementById(`view-timeline-${containerId}`).style.display = view === 'timeline' ? '' : 'none';
  btn.closest('.view-toggle').querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b === btn));
}

function switchTab(split, btn) {
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.getElementById(split === "brust" ? "panel-brust" : "panel-ruecken").classList.add("active");
  if (btn) btn.closest(".view-toggle").querySelectorAll(".view-btn").forEach(b => b.classList.toggle("active", b === btn));
}

// Init
renderPanel("Brust", "panel-brust");
renderPanel("Rücken", "panel-ruecken");
// Show latest session overall in the global table
const _latestOverall = [...SESSIONS].sort((a,b) => b.date.localeCompare(a.date))[0];
calState.selected = _latestOverall.date;
renderGlobalCal();
updateGlobalTable(_latestOverall.date);

// ── Scroll fade-in ──
const _fadeObs = new IntersectionObserver(
  entries => entries.forEach(e => e.isIntersecting && e.target.classList.add('visible')),
  { threshold: 0.06 }
);
document.querySelectorAll('.fade-in-up').forEach(el => _fadeObs.observe(el));

// ── Global session fade-in ──
document.querySelectorAll('#global-session .cal-outer, #global-session .session-table-wrap').forEach(el => {
  el.classList.add('fade-in-up');
  _fadeObs.observe(el);
});
</script>
